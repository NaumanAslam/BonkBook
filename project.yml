name: BonkBook
options:
  bundleIdPrefix: com.naumanaslam
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  BonkBook:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: BonkBook
        excludes:
          - Sounds/**
          - spank
      - path: BonkBook/Sounds
        type: folder
    settings:
      base:
        PRODUCT_NAME: BonkBook
        BUNDLE_IDENTIFIER: com.naumanaslam.BonkBook
        INFOPLIST_FILE: BonkBook/Info.plist
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: BonkBook/BonkBook.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
